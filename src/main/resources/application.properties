# Server Configuration
server.port=8081

# PostgreSQL DataSource Configuration
spring.datasource.url=jdbc:postgresql:dhis2
spring.datasource.username=dhis
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=DbPopulatorPool
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# Batch Insert Configuration
app.batch.size=5000

# Async Task Executor Configuration
app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=100
